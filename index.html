<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title id="page-title">TripPlanner+</title>
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <link rel="stylesheet" href="css/styles.css" />
        <link rel="stylesheet" href="css/chat.css" />
        <link rel="stylesheet" id="page-styles" href="" />
    </head>

    <body>
        <header class="site-header">
            <div class="navbar">
                <nav class="nav-left">
                    <a href="?page=trips">Trips</a>
                    <a href="?page=weather">Weather</a>
                    <a href="?page=about">About</a>
                </nav>

                <div class="nav-center">
                    <a href="?page=home" class="logo-center">
                        <p>Trip</p>
                        <img
                            class="logo-img"
                            src="media/logo.png"
                            alt="TripPlanner+ Logo"
                        />
                        <p>Planner+</p>
                    </a>
                </div>

                <div class="nav-right">
                    <button class="btn btn-outline" id="ai-chat-btn" type="button">Chat with AI</button>
                </div>
            </div>
        </header>

        <!-- AI chat -->
        <div class="ai-chat-overlay" id="ai-chat-overlay">
            <div class="ai-chat-popup">
                <div class="ai-chat-header">
                    <h3>Trip Suggestions</h3>
                    <button class="ai-chat-close" id="ai-chat-close">&times;</button>
                </div>
                <div class="ai-chat-messages" id="ai-chat-messages">
                    <div class="ai-message incoming">
                        <p>Hi! I'm your personal AI travel assistant. Ask me for destination ideas, activity suggestions or travel tips!</p>
                    </div>
                </div>
                <form class="ai-chat-input" id="ai-chat-form">
                    <input type="text" id="ai-chat-input" placeholder="Ask for trip suggestions..." autocomplete="off" />
                    <button type="submit" class="ai-send-btn">Send</button>
                </form>
            </div>
        </div>

        <main id="page-root" class="page-root">
            <!-- Content loaded here -->
        </main>
        <script src="js/config.js"></script>
        <script src="js/index.js"></script>
        <script src="js/home.js"></script>
        <script src="js/trips.js"></script>
        <script src="js/about.js"></script>
        <script src="js/weather.js"></script>
        <script src="js/ai.js"></script>
    </body>
</html>
