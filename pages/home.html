<div class="home-video">
    <video
        class="home-video-bg"
        src="media/cinematic.mp4"
        autoplay
        muted
        loop
        playsinline
        preload="auto"
    ></video>
</div>

<section class="home-main" id="home-main">
    <!-- Overlay content -->
    <div class="home-container">
        <h1>Plan trips built by travellers</h1>
        <p>Search your ideal destination and build your route stop by stop.</p>

        <form id="route-form" class="route-form" novalidate>
            <div class="input-wrapper">
                <input
                    type="text"
                    id="route-destination"
                    class="route-input"
                    placeholder="Where would you like to explore?"
                />
                <button type="submit" class="btn-explore">Explore</button>
            </div>
        </form>
    </div>
</section>

<section id="home-cards" class="home-section">
    <div class="home-cards-inner">
        <h1 class="home-cards-title">Discover TripPlanner+ features</h1>
        <div class="cards-grid">
            <a href="?page=trips" class="home-card">
                <div class="home-card-inner">
                    <img src="media/card1.jpg" alt="Popular routes" />
                    <div class="home-card-overlay">
                        <h3>Weather Aware</h3>
                        <p>
                            Plan with forecast thanks to our advanced weather
                            predictions.
                        </p>
                    </div>
                </div>
            </a>

            <a href="?page=weather" class="home-card">
                <div class="home-card-inner">
                    <img src="media/card2.jpg" alt="Weather-aware trips" />
                    <div class="home-card-overlay">
                        <h3>Weather-aware</h3>
                        <p>Plan with forecast on every stop.</p>
                    </div>
                </div>
            </a>

            <a href="?page=about" class="home-card">
                <div class="home-card-inner">
                    <img src="media/card3.jpg" alt="Smart budgeting" />
                    <div class="home-card-overlay">
                        <h3>Smart budgeting</h3>
                        <p>Track costs as you go.</p>
                    </div>
                </div>
            </a>
        </div>
    </div>
</section>

<section class="toggle-section">
    <button id="home-toggle-btn" class="toggle-btn" aria-label="Show more">
        ↓
    </button>
</section>
